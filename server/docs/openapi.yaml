components:
  schemas:
    Access:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/Access.json
          format: uri
          readOnly: true
          type: string
        accessToken:
          type: string
        expiry:
          format: date-time
          type: string
        refreshToken:
          type: string
      required:
        - accessToken
        - refreshToken
        - expiry
      type: object
    CreateFamilyRequestBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/CreateFamilyRequestBody.json
          format: uri
          readOnly: true
          type: string
        name:
          type: string
      required:
        - name
      type: object
    CreateLocationRequestBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/CreateLocationRequestBody.json
          format: uri
          readOnly: true
          type: string
        lat:
          format: double
          type: number
        lon:
          format: double
          type: number
      required:
        - lat
        - lon
      type: object
    ErrorDetail:
      additionalProperties: false
      properties:
        location:
          description: Where the error occurred, e.g. 'body.items[3].tags' or 'path.thing-id'
          type: string
        message:
          description: Error message text
          type: string
        value:
          description: The value at the given location
      type: object
    ErrorModel:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/ErrorModel.json
          format: uri
          readOnly: true
          type: string
        detail:
          description: A human-readable explanation specific to this occurrence of the problem.
          examples:
            - Property foo is required but is missing.
          type: string
        errors:
          description: Optional list of individual error details
          items:
            $ref: "#/components/schemas/ErrorDetail"
          type:
            - array
            - "null"
        instance:
          description: A URI reference that identifies the specific occurrence of the problem.
          examples:
            - https://example.com/error-log/abc123
          format: uri
          type: string
        status:
          description: HTTP status code
          examples:
            - 400
          format: int64
          type: integer
        title:
          description: A short, human-readable summary of the problem type. This value should not change between occurrences of the error.
          examples:
            - Bad Request
          type: string
        type:
          default: about:blank
          description: A URI reference to human-readable documentation for the error.
          examples:
            - https://example.com/errors/example
          format: uri
          type: string
      type: object
    Family:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/Family.json
          format: uri
          readOnly: true
          type: string
        createdAt:
          format: date-time
          type: string
        createdBy:
          type: string
        id:
          type: string
        name:
          type: string
        updatedAt:
          format: date-time
          type: string
      required:
        - id
        - name
        - createdBy
        - createdAt
        - updatedAt
      type: object
    FamilyMember:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/FamilyMember.json
          format: uri
          readOnly: true
          type: string
        createdAt:
          format: date-time
          type: string
        family:
          type: string
        user:
          type: string
      required:
        - user
        - family
        - createdAt
      type: object
    HealthCheckResponse:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/HealthCheckResponse.json
          format: uri
          readOnly: true
          type: string
        status:
          type: string
      required:
        - status
      type: object
    Location:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/Location.json
          format: uri
          readOnly: true
          type: string
        createdAt:
          format: date-time
          type: string
        id:
          type: string
        lat:
          format: double
          type: number
        lon:
          format: double
          type: number
        user:
          type: string
      required:
        - id
        - user
        - lat
        - lon
        - createdAt
      type: object
    RefreshRequestBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/RefreshRequestBody.json
          format: uri
          readOnly: true
          type: string
        refreshToken:
          type: string
      required:
        - refreshToken
      type: object
    RegisterUserRequestBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/RegisterUserRequestBody.json
          format: uri
          readOnly: true
          type: string
        email:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        password:
          type: string
      required:
        - email
        - password
        - firstName
        - lastName
      type: object
    SignInRequestBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/SignInRequestBody.json
          format: uri
          readOnly: true
          type: string
        email:
          type: string
        password:
          type: string
      required:
        - email
        - password
      type: object
    UpdateMeRequestBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/UpdateMeRequestBody.json
          format: uri
          readOnly: true
          type: string
        firstName:
          type: string
        lastName:
          type: string
      type: object
    User:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/User.json
          format: uri
          readOnly: true
          type: string
        FirstName:
          type: string
        LastName:
          type: string
        avatar:
          type:
            - string
            - "null"
        createdAt:
          format: date-time
          type: string
        email:
          type: string
        id:
          type: string
        updatedAt:
          format: date-time
          type: string
      required:
        - id
        - email
        - FirstName
        - LastName
        - avatar
        - createdAt
        - updatedAt
      type: object
info:
  title: Tribe Tracker API
  version: 1.0.0
openapi: 3.1.0
paths:
  /api/families:
    post:
      description: Create a new family.
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFamilyRequestBody"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Family"
          description: Created
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Create family
      tags:
        - Family
  /api/families/{familyId}/members:
    post:
      description: Join a new family.
      parameters:
        - in: path
          name: familyId
          required: true
          schema:
            type: string
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FamilyMember"
          description: Created
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Join family
      tags:
        - Family
  /api/healthcheck:
    get:
      operationId: get-api-healthcheck
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthCheckResponse"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Get API healthcheck
  /api/locations:
    post:
      description: Create a new location.
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLocationRequestBody"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Location"
          description: Created
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Create location
      tags:
        - Location
  /api/refresh:
    post:
      description: Refresh an existing token.
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequestBody"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Access"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Refresh token
      tags:
        - Auth
  /api/register:
    post:
      description: Register a new user.
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterUserRequestBody"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Access"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Register user
      tags:
        - Auth
  /api/sign-in:
    post:
      description: Sign in to an existing account.
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignInRequestBody"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Access"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Sign in
      tags:
        - Auth
  /api/sync:
    get:
      description: Get sync data from after the given date.
      parameters:
        - explode: false
          in: query
          name: after
          schema:
            format: date-time
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                type: string
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Get sync data
      tags:
        - Sync
  /api/users/me:
    patch:
      description: Updates the caller's user.
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMeRequestBody"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Update me
      tags:
        - User
